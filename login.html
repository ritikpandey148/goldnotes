<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - GoldNotes</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom,#f8f6f2,#f3efe7);
}
.gold-btn{
    background: linear-gradient(90deg,#d4af37,#f5d76e);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="bg-white p-10 rounded-3xl shadow-xl w-96">

    <h2 class="text-center text-2xl font-bold mb-6 text-gray-700">
        Login
    </h2>

    <input type="text" id="loginUsername"
        placeholder="Enter Username"
        class="w-full p-3 border rounded-xl mb-4">

    <input type="password" id="loginPassword"
        placeholder="Enter Password"
        class="w-full p-3 border rounded-xl mb-6">

    <button type="button" onclick="loginUser()"
        class="gold-btn w-full py-3 rounded-xl text-white font-semibold">
        Login
    </button>

    <p class="text-center mt-6 text-gray-500">
        Don't have an account?
        <a href="signup.html" class="text-yellow-600 font-semibold">
            Create Account
        </a>
    </p>

</div>

<script>
async function loginUser(){

    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;

    if(!username || !password){
        alert("Please fill all fields");
        return;
    }

    try {

        const response = await fetch("https://goldnotes-backend.onrender.com/login", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if(response.ok && result.user){
            
            // Save user data
            localStorage.setItem("user", JSON.stringify(result.user));

            alert("Login Successful 🎉");

            // Redirect
            window.location.href = "dashboard.html";

        } else {
            alert(result.message || "Invalid Credentials");
        }

    } catch(error) {
        alert("Server not responding. Please try again later.");
        console.error(error);
    }
}
</script>

</body>
</html>
