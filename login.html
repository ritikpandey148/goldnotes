<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - GoldNotes</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom,#f8f6f2,#f3efe7);
}
.gold-btn{
    background: linear-gradient(90deg,#d4af37,#f5d76e);
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="bg-white p-10 rounded-3xl shadow-xl w-96">

    <h2 class="text-center text-2xl font-bold mb-6 text-gray-700">
        Login
    </h2>

    <!-- Username Input -->
    <input type="text" id="loginUsername"
        placeholder="Enter Username"
        class="w-full p-3 border rounded-xl mb-4">

    <!-- Password Input -->
    <input type="password" id="loginPassword"
        placeholder="Enter Password"
        class="w-full p-3 border rounded-xl mb-6">

    <!-- Login Button -->
    <button type="button" onclick="loginUser()"
        class="gold-btn w-full py-3 rounded-xl text-white font-semibold">
        Login
    </button>

    <!-- Signup Link -->
    <p class="text-center mt-6 text-gray-500">
        Don't have an account?
        <a href="signup.html" class="text-yellow-600 font-semibold">
            Create Account
        </a>
    </p>

</div>

<script>
async function loginUser(){

    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;

    if(!username || !password){
        alert("Please fill all fields");
        return;
    }

    const response = await fetch("http://localhost:5000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const result = await response.json();

    if(result.user){
        // Save user data
        localStorage.setItem("user", JSON.stringify(result.user));

        // Redirect to dashboard
        window.location.href = "dashboard.html";
    } 
    else{
        alert(result.message);
    }
}
</script>

</body>
</html>
