<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Admin Panel - GoldNotes</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:linear-gradient(to bottom,#f8f6f2,#f3efe7);
}

.card{
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.gold-btn{
background:linear-gradient(90deg,#d4af37,#f5d76e);
}

</style>

</head>

<body class="p-10">

<h1 class="text-3xl font-bold text-center text-yellow-700 mb-10">
GoldNotes Admin Panel
</h1>

<div class="grid md:grid-cols-2 gap-10 max-w-5xl mx-auto">

<!-- ================= UPLOAD ================= -->

<div class="card p-6">

<h2 class="text-xl font-semibold mb-4">
Upload Notes
</h2>

<select id="year" class="w-full border p-2 rounded mb-3"></select>
<select id="semester" class="w-full border p-2 rounded mb-3"></select>
<select id="subject" class="w-full border p-2 rounded mb-3"></select>

<select id="type" class="w-full border p-2 rounded mb-3">

<option value="study">Study Material</option>
<option value="notes">Important Notes</option>
<option value="pyq">PYQ</option>

</select>

<input type="text"
id="title"
placeholder="Title"
class="w-full border p-2 rounded mb-3">

<input type="file" id="pdfFile" class="mb-4">

<button onclick="uploadNote()"
class="gold-btn text-white px-4 py-2 rounded">

Upload

</button>

<p id="uploadMsg" class="mt-3 text-sm"></p>

</div>

<!-- ================= YT ================= -->

<div class="card p-6">

<h2 class="text-xl font-semibold mb-4">
Add YouTube Playlist
</h2>

<input id="ytLink"
placeholder="Paste YouTube Playlist Link"
class="w-full border p-2 rounded mb-4">

<button onclick="addYT()"
class="bg-red-600 text-white px-4 py-2 rounded">

Add Playlist

</button>

<p id="ytMsg" class="mt-3 text-sm"></p>

</div>

</div>

<!-- ================= MANAGE NOTES ================= -->

<div class="card p-6 max-w-5xl mx-auto mt-10">

<h2 class="text-xl font-semibold mb-4">
Manage Notes
</h2>

<button onclick="loadNotes()"
class="gold-btn text-white px-4 py-2 rounded mb-4">
Load Notes
</button>

<div id="notesList"></div>

</div>

<!-- ================= ANALYTICS ================= -->

<div class="card p-6 max-w-5xl mx-auto mt-10">

<h2 class="text-xl font-semibold mb-4">
Download Analytics
</h2>

<button onclick="loadAnalytics()"
class="gold-btn text-white px-4 py-2 rounded mb-4">

Load Analytics

</button>

<div id="analytics"></div>

</div>

<script>

const API="https://goldnotes-backend.onrender.com"

const user=JSON.parse(localStorage.getItem("user"))

if(!user || user.username!=="ritik030"){
alert("Access Denied")
window.location.href="/dashboard.html"
}

// ================= SUBJECT DATA =================

const subjectsData = {
"1stYear":{"SEM1":["Physics","Chemistry","Mathematics I","Basic Electronics","E-Mechanics","c/c++"],"SEM2":["Mathematics II","Python","physics-2","chmistry-2","E-Graphics"]},
"2ndYear":{"SEM3":["DBMS","AOA","DMGT","EVS","OOP"],"SEM4":["STO","SEPM","MAM","DT","MDM-info-sec"]},
"3rdYear":{"SEM5":["Artificial Intelligence","Web Development","Microprocessors","Data Analytics"],"SEM6":["Machine Learning","Cloud Computing","Compiler Design","Cyber Security"]},
"4thYear":{"SEM7":["Big Data","Blockchain","Internet of Things","Project Phase I"],"SEM8":["Project Phase II","Advanced AI","Mobile App Development","Entrepreneurship"]}
}

const yearSelect=document.getElementById("year")
const semSelect=document.getElementById("semester")
const subjectSelect=document.getElementById("subject")

Object.keys(subjectsData).forEach(year=>{
const opt=document.createElement("option")
opt.value=year
opt.innerText=year
yearSelect.appendChild(opt)
})

loadSemesters()
yearSelect.onchange=loadSemesters
semSelect.onchange=loadSubjects

function loadSemesters(){
semSelect.innerHTML=""
const sems=subjectsData[yearSelect.value]
Object.keys(sems).forEach(sem=>{
const opt=document.createElement("option")
opt.value=sem
opt.innerText=sem
semSelect.appendChild(opt)
})
loadSubjects()
}

function loadSubjects(){
subjectSelect.innerHTML=""
const subjects=subjectsData[yearSelect.value][semSelect.value]
subjects.forEach(sub=>{
const opt=document.createElement("option")
opt.value=sub
opt.innerText=sub
subjectSelect.appendChild(opt)
})
}

// ================= UPLOAD =================

async function uploadNote(){
const form=new FormData()
form.append("year",yearSelect.value)
form.append("semester",semSelect.value)
form.append("subject",subjectSelect.value)
form.append("type",document.getElementById("type").value)
form.append("title",document.getElementById("title").value)
form.append("pdf",document.getElementById("pdfFile").files[0])

const res=await fetch(`${API}/admin/upload`,{method:"POST",body:form})
const data=await res.json()
document.getElementById("uploadMsg").innerText=data.message
}

// ================= LOAD NOTES =================

async function loadNotes(){

const res=await fetch(`${API}/admin/materials?year=${yearSelect.value}&semester=${semSelect.value}&subject=${subjectSelect.value}&type=${document.getElementById("type").value}`)

const data=await res.json()

const div=document.getElementById("notesList")
div.innerHTML=""

data.forEach(note=>{

const box=document.createElement("div")
box.className="border p-3 rounded mb-3"

box.innerHTML=`
<h3 class="font-semibold">${note.title}</h3>
<a href="${note.file_path}" target="_blank" class="text-blue-500">View</a>

<div class="mt-2 space-x-2">

<button onclick="deleteNote(${note.id})" class="bg-red-500 text-white px-2 py-1 rounded">Delete</button>

<button onclick="replaceNote(${note.id})" class="bg-yellow-500 text-white px-2 py-1 rounded">Replace</button>

<button onclick="editTitle(${note.id})" class="bg-blue-500 text-white px-2 py-1 rounded">Edit Title</button>

</div>
`

div.appendChild(box)

})

}

// ================= DELETE =================

async function deleteNote(id){
if(!confirm("Delete this note?")) return
await fetch(`${API}/admin/material/${id}`,{method:"DELETE"})
alert("Deleted")
loadNotes()
}

// ================= EDIT TITLE =================

async function editTitle(id){
const newTitle=prompt("Enter new title")
if(!newTitle) return

await fetch(`${API}/admin/material/title/${id}`,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title:newTitle})
})

alert("Updated")
loadNotes()
}

// ================= REPLACE =================

async function replaceNote(id){

const fileInput=document.createElement("input")
fileInput.type="file"

fileInput.onchange=async()=>{

const form=new FormData()
form.append("pdf",fileInput.files[0])

await fetch(`${API}/admin/material/replace/${id}`,{
method:"PUT",
body:form
})

alert("Replaced")
loadNotes()

}

fileInput.click()

}

// ================= YT =================

async function addYT(){
const res=await fetch(`${API}/admin/add-yt`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
year:yearSelect.value,
semester:semSelect.value,
subject:subjectSelect.value,
link:document.getElementById("ytLink").value
})
})
const data=await res.json()
document.getElementById("ytMsg").innerText=data.message
}

// ================= ANALYTICS =================

async function loadAnalytics(){
const res=await fetch(`${API}/admin/analytics`)
const data=await res.json()
const div=document.getElementById("analytics")
div.innerHTML=""

data.forEach(item=>{
const row=document.createElement("div")
row.className="border-b p-2"
row.innerText=`${item.file_name} — ${item.downloads} downloads`
div.appendChild(row)
})
}

</script>

</body>
</html>
