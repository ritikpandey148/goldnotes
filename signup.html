<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Sign Up - GoldNotes</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom,#f8f6f2,#f3efe7);
}
.gold-btn{
    background: linear-gradient(90deg,#d4af37,#f5d76e);
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-3xl shadow-xl w-96">

<h2 class="text-center text-2xl font-bold mb-6 text-gray-700">
Create Account
</h2>

<input id="firstName" placeholder="First Name"
class="w-full p-2 border rounded-xl mb-3">

<input id="lastName" placeholder="Last Name"
class="w-full p-2 border rounded-xl mb-3">

<select id="gender"
class="w-full p-2 border rounded-xl mb-3">

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input id="dob" type="date"
class="w-full p-2 border rounded-xl mb-3">

<select id="year"
class="w-full p-2 border rounded-xl mb-3">

<option value="">Select Year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>

<input id="username" placeholder="Create Username"
class="w-full p-2 border rounded-xl mb-3">

<input id="password" type="password" placeholder="Create Password"
class="w-full p-2 border rounded-xl mb-3">

<!-- PROFILE PHOTO (OPTIONAL) -->

<label class="text-sm text-gray-600 mb-1 block">
Upload Profile Picture (Optional)
</label>

<input type="file" id="profilePhoto"
accept="image/*"
class="w-full p-2 border rounded-xl mb-4">

<button type="button" onclick="registerUser()"
class="gold-btn w-full py-3 rounded-xl text-white font-semibold">
Create Account </button>

<p class="text-center mt-4 text-gray-500">
Already have account?
<a href="login.html" class="text-yellow-600 font-semibold">Login</a>
</p>

</div>

<script>

async function registerUser(){

const first_name=document.getElementById("firstName").value.trim()
const last_name=document.getElementById("lastName").value.trim()
const gender=document.getElementById("gender").value
const dob=document.getElementById("dob").value
const year=document.getElementById("year").value
const username=document.getElementById("username").value.trim()
const password=document.getElementById("password").value
const photo=document.getElementById("profilePhoto").files[0]

if(!first_name || !last_name || !gender || !dob || !year || !username || !password){
alert("Please fill all required fields")
return
}

try{

const formData=new FormData()

formData.append("first_name",first_name)
formData.append("last_name",last_name)
formData.append("gender",gender)
formData.append("dob",dob)
formData.append("year",year)
formData.append("username",username)
formData.append("password",password)

if(photo){
formData.append("profile_photo",photo)
}

const response=await fetch("https://goldnotes-backend.onrender.com/register",{
method:"POST",
body:formData
})

const result=await response.json()

if(response.ok){

alert("Account Created Successfully 🎉")

window.location.href="login.html"

}else{

alert(result.message || "Signup failed")

}

}catch(err){

console.error(err)
alert("Server not responding")

}

}

</script>

</body>
</html>
