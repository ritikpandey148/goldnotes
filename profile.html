<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile - GoldNotes</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(to bottom,#f8f6f2,#f3efe7);
}

.card{
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.gold-btn{
background:linear-gradient(90deg,#d4af37,#f5d76e);
}
</style>

</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="card w-full max-w-md p-8">

<div class="text-center mb-6">
<img src="assets/logo.png" class="w-16 mx-auto mb-2">
<h2 class="text-2xl font-bold text-yellow-700">My Profile</h2>
</div>

<!-- PROFILE PHOTO -->

<div class="flex flex-col items-center mb-6">

<img id="profilePhoto"
class="w-24 h-24 rounded-full object-cover border mb-3">

<input type="file" id="photoInput" accept="image/*" class="hidden">

<div class="flex gap-3">

<button onclick="document.getElementById('photoInput').click()"
class="bg-blue-500 text-white px-3 py-1 rounded">
Change </button>

<button onclick="removePhoto()"
class="bg-red-500 text-white px-3 py-1 rounded">
Remove </button>

</div>

</div>

<div class="space-y-4 text-gray-700">

<div>
<label class="text-sm text-gray-500">First Name</label>
<input id="profileFirstName" type="text"
class="w-full p-2 border rounded-xl mt-1">
</div>

<div>
<label class="text-sm text-gray-500">Last Name</label>
<input id="profileLastName" type="text"
class="w-full p-2 border rounded-xl mt-1">
</div>

<div>
<label class="text-sm text-gray-500">Username</label>
<input id="profileUsername" type="text" disabled
class="w-full p-2 border rounded-xl mt-1 bg-gray-100">
</div>

<div>
<label class="text-sm text-gray-500">Gender</label>
<input id="profileGender" type="text"
class="w-full p-2 border rounded-xl mt-1">
</div>

<div>
<label class="text-sm text-gray-500">Date of Birth</label>
<input id="profileDob" type="date"
class="w-full p-2 border rounded-xl mt-1">
</div>

<div>
<label class="text-sm text-gray-500">Year of Study</label>
<input id="profileYear" type="text"
class="w-full p-2 border rounded-xl mt-1">
</div>

</div>

<div class="mt-6">
<button onclick="saveProfile()"
class="gold-btn w-full py-3 rounded-xl text-white font-semibold hover:scale-105 transition">
Save Changes
</button>
</div>

</div>

<script>

const API="https://goldnotes-backend.onrender.com"

let currentUser=null

window.onload=function(){

const user=JSON.parse(localStorage.getItem("user"))

if(!user){
window.location.href="login.html"
return
}

currentUser=user

document.getElementById("profileFirstName").value=user.first_name||""
document.getElementById("profileLastName").value=user.last_name||""
document.getElementById("profileUsername").value=user.username||""
document.getElementById("profileGender").value=user.gender||""
document.getElementById("profileDob").value=user.dob?user.dob.split("T")[0]:""
document.getElementById("profileYear").value=user.year||""

loadProfilePhoto()

}

// LOAD PHOTO
function loadProfilePhoto(){

let photoURL=""

if(currentUser.profile_photo){

photoURL=`${API}/${currentUser.profile_photo}`

}else{

if(currentUser.gender==="Male"){
photoURL="assets/default-male.png"
}
else if(currentUser.gender==="Female"){
photoURL="assets/default-female.png"
}
else{
photoURL="assets/default-user.png"
}

}

document.getElementById("profilePhoto").src=photoURL

}

// CHANGE PHOTO
document.getElementById("photoInput").addEventListener("change",async function(){

const file=this.files[0]

if(!file) return

const formData=new FormData()

formData.append("user_id",currentUser.id)
formData.append("photo",file)

const res=await fetch(`${API}/update-profile-photo`,{

method:"POST",
body:formData

})

const data=await res.json()

if(res.ok){

currentUser.profile_photo=data.photo
localStorage.setItem("user",JSON.stringify(currentUser))

loadProfilePhoto()

alert("Photo Updated ✅")

}else{

alert(data.message)

}

})

// REMOVE PHOTO
async function removePhoto(){

const res=await fetch(`${API}/remove-profile-photo`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
user_id:currentUser.id
})

})

const data=await res.json()

if(res.ok){

currentUser.profile_photo=null
localStorage.setItem("user",JSON.stringify(currentUser))

loadProfilePhoto()

alert("Photo Removed")

}

}

// SAVE PROFILE
async function saveProfile(){

const updatedData={

id:currentUser.id,
first_name:document.getElementById("profileFirstName").value,
last_name:document.getElementById("profileLastName").value,
gender:document.getElementById("profileGender").value,
dob:document.getElementById("profileDob").value,
year:document.getElementById("profileYear").value

}

const response=await fetch(`${API}/update-profile`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(updatedData)

})

const result=await response.json()

if(response.ok){

currentUser={...currentUser,...updatedData}

localStorage.setItem("user",JSON.stringify(currentUser))

alert("Profile Updated Successfully ✅")

}else{

alert(result.message)

}

}

</script>

</body>
</html>
