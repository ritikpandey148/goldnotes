<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<meta charset="UTF-8">
<title>Files - GoldNotes</title>

<style>
body{
background: linear-gradient(to bottom,#f8f6f2,#f3efe7);
}
.card{
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
.gold-btn{
background: linear-gradient(90deg,#d4af37,#f5d76e);
}
</style>
</head>

<body class="p-6">

<h2 id="pageTitle" class="text-3xl font-bold text-center text-yellow-700 mb-10"></h2>

<div id="contentContainer" class="grid gap-6"></div>

<script>

// ================= CONFIG =================
const API_BASE="https://goldnotes-backend.onrender.com"

// ================= PARAMS =================
const params=new URLSearchParams(window.location.search)

const subject=params.get("subject")
const type=params.get("type")
const year=params.get("year")
const semester=params.get("semester")

const user=JSON.parse(localStorage.getItem("user"))

if(!user){
window.location.href="login.html"
}

const pageTitle=document.getElementById("pageTitle")
const container=document.getElementById("contentContainer")

pageTitle.innerText=`${subject} - ${type.toUpperCase()}`


// ================= LOAD FILES =================

async function loadFiles(){

try{

const res=await fetch(
`${API_BASE}/materials?year=${year}&semester=${semester}&subject=${subject}&type=${type}`
)

const data=await res.json()

container.innerHTML=""

if(data.length===0){

container.innerHTML="<p class='text-center'>No files available yet.</p>"
return

}

data.forEach(item=>{

const card=document.createElement("div")
card.className="card p-6"

if(type==="yt"){

card.innerHTML=`

<a href="${item.yt_link}" 
target="_blank"
class="gold-btn px-6 py-3 text-white rounded-xl">

Open YouTube Playlist

</a>

`

}else{

// FILE URL
const fileURL=`${API_BASE}/files/${item.file_path.replace("uploads/","")}`

// FILE NAME
const fileName=item.file_path.split("/").pop()

card.innerHTML=`

<p class="mb-4 font-semibold">
${item.title || fileName}
</p>

<div class="flex gap-4">

<a href="${fileURL}"
target="_blank"
class="gold-btn px-4 py-2 rounded-xl text-white">

View

</a>

<a href="${fileURL}"
download
onclick="trackDownload('${subject}','${fileName}','${type}','${fileURL}')"
class="bg-black px-4 py-2 rounded-xl text-white">

Download

</a>

</div>

`

}

container.appendChild(card)

})

}catch(err){

console.log(err)
container.innerHTML="<p class='text-center'>Error loading files</p>"

}

}

loadFiles()


// ================= DOWNLOAD TRACK =================

async function trackDownload(subject,fileName,type,filePath){

try{

await fetch(`${API_BASE}/download`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:user.id,
subject:subject,
file_name:fileName,
year:year,
semester:semester,
type:type,
file_path:filePath

})

})

}catch(err){

console.log("Download track error")

}

}

</script>

</body>
</html>
