<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<meta charset="UTF-8">
<title>Materials</title>

<style>
body{
background: linear-gradient(to bottom,#f8f6f2,#f3efe7);
}
.card{
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
</style>
</head>

<body class="p-6">

<h2 id="subjectTitle" class="text-3xl font-bold text-center text-yellow-700 mb-2"></h2>

<p class="text-center text-gray-600 mb-6">
Chill karo sab milega 😎, jo chahiye uthalo!
</p>

<!-- Vote -->
<div class="text-center mb-8">

<button onclick="voteSubject()"
class="bg-yellow-600 text-white px-5 py-2 rounded-xl hover:bg-yellow-700">

👍 Vote This Subject

</button>

<p id="voteMsg" class="mt-3 text-sm text-gray-600"></p>

</div>

<!-- Options -->

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<a id="studyLink"
class="card p-6 text-center hover:scale-105 transition font-semibold cursor-pointer">
Study Material
</a>

<a id="notesLink"
class="card p-6 text-center hover:scale-105 transition font-semibold cursor-pointer">
Important Notes
</a>

<a id="pyqLink"
class="card p-6 text-center hover:scale-105 transition font-semibold cursor-pointer">
PYQs
</a>

<a id="ytLink"
class="card p-6 text-center hover:scale-105 transition font-semibold cursor-pointer">
Best YT Playlist
</a>

</div>

<script>

// API
const API_BASE="https://goldnotes-backend.onrender.com"

// URL PARAMS
const params=new URLSearchParams(window.location.search)

const subject=params.get("subject")
const year=params.get("year") || ""
const semester=params.get("semester") || ""

const user=JSON.parse(localStorage.getItem("user"))

// Login check
if(!user){
window.location.href="login.html"
}

// Subject safety
if(!subject){
document.getElementById("subjectTitle").innerText="Invalid Subject"
throw new Error("Subject missing")
}

// Show subject
document.getElementById("subjectTitle").innerText=subject


// LINKS

document.getElementById("studyLink").href=
`files.html?year=${year}&semester=${semester}&subject=${encodeURIComponent(subject)}&type=study`

document.getElementById("notesLink").href=
`files.html?year=${year}&semester=${semester}&subject=${encodeURIComponent(subject)}&type=notes`

document.getElementById("pyqLink").href=
`files.html?year=${year}&semester=${semester}&subject=${encodeURIComponent(subject)}&type=pyq`

document.getElementById("ytLink").href=
`files.html?year=${year}&semester=${semester}&subject=${encodeURIComponent(subject)}&type=yt`


// VOTE

async function voteSubject(){

try{

const res=await fetch(`${API_BASE}/vote`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:user.id,
subject:subject

})

})

const voteMsg=document.getElementById("voteMsg")

if(res.status===400){

voteMsg.innerText="❌ You already voted for this subject"
voteMsg.className="mt-3 text-sm text-red-600"

}
else{

voteMsg.innerText="✅ Vote added successfully!"
voteMsg.className="mt-3 text-sm text-green-600"

}

}catch(err){

alert("Server not responding")

}

}

</script>

</body>
</html>
