<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<meta charset="UTF-8">
<title>Materials</title>

<style>
body{
    background: linear-gradient(to bottom,#f8f6f2,#f3efe7);
}
.card{
    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
</style>
</head>

<body class="p-6">

<h2 id="subjectTitle" class="text-3xl font-bold text-center text-yellow-700 mb-2"></h2>

<p class="text-center text-gray-600 mb-6">
    Chill karo sab milega 😎, jo chahiye uthalo!
</p>

<!-- ✅ VOTE SECTION -->
<div class="text-center mb-8">
    <button id="voteBtn"
        onclick="voteSubject()"
        class="bg-yellow-600 text-white px-5 py-2 rounded-xl hover:bg-yellow-700 transition">
        👍 Vote This Subject
    </button>

    <p id="voteMsg" class="mt-3 text-sm text-gray-600"></p>
</div>

<!-- OPTIONS -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <a id="studyLink" class="card p-6 text-center hover:scale-105 transition font-semibold cursor-pointer">
        Study Material
    </a>

    <a id="notesLink" class="card p-6 text-center hover:scale-105 transition font-semibold cursor-pointer">
        Important Notes
    </a>

    <a id="pyqLink" class="card p-6 text-center hover:scale-105 transition font-semibold cursor-pointer">
        PYQs
    </a>

    <a id="ytLink" class="card p-6 text-center hover:scale-105 transition font-semibold cursor-pointer">
        Best YT Playlist
    </a>

</div>

<script>

// ================= CONFIG =================
const API_BASE = "https://goldnotes-backend.onrender.com";

// ================= SUBJECT SETUP =================
const params = new URLSearchParams(window.location.search);
const subject = params.get("subject");
const user = JSON.parse(localStorage.getItem("user"));

// Login protection
if(!user){
    window.location.href = "login.html";
}

// Safety check
if(!subject){
    document.getElementById("subjectTitle").innerText = "Invalid Subject";
    throw new Error("Subject missing in URL");
}

document.getElementById("subjectTitle").innerText = subject;

document.getElementById("studyLink").href =
    `files.html?type=study&subject=${encodeURIComponent(subject)}`;

document.getElementById("notesLink").href =
    `files.html?type=notes&subject=${encodeURIComponent(subject)}`;

document.getElementById("pyqLink").href =
    `files.html?type=pyq&subject=${encodeURIComponent(subject)}`;

document.getElementById("ytLink").href =
    `files.html?type=yt&subject=${encodeURIComponent(subject)}`;


// ================= VOTE FUNCTION =================
async function voteSubject(){

    if(!user){
        alert("Please login first");
        return;
    }

    try {

        const res = await fetch(`${API_BASE}/vote`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                user_id: user.id,
                subject: subject
            })
        });

        const voteMsg = document.getElementById("voteMsg");

        if(res.status === 400){
            voteMsg.innerText = "❌ You already voted for this subject";
            voteMsg.className = "mt-3 text-sm text-red-600";
        } 
        else if(res.ok){
            voteMsg.innerText = "✅ Vote added successfully!";
            voteMsg.className = "mt-3 text-sm text-green-600";
        }
        else{
            voteMsg.innerText = "Something went wrong";
            voteMsg.className = "mt-3 text-sm text-red-600";
        }

    } catch(error){
        alert("Server not responding. Please try again later.");
        console.error(error);
    }
}

</script>

</body>
</html>
